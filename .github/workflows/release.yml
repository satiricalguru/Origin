name: Build & Release

on:
  push:
    tags:
      - "v*"          # triggers on: git tag v1.0.0 && git push --tags

permissions:
  contents: write     # needed to create GitHub Releases and upload assets

jobs:
  # ────────────────────────────────────────────────
  # macOS: build Origin.app + Origin.dmg
  # ────────────────────────────────────────────────
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build DMG
        run: |
          chmod +x build-macos-app.sh
          ./build-macos-app.sh

      - name: Upload DMG artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/Origin.dmg
          if-no-files-found: error

  # ────────────────────────────────────────────────
  # Windows: build Origin-Setup.exe via NSIS
  # ────────────────────────────────────────────────
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install NSIS
        shell: pwsh
        run: choco install nsis --yes --no-progress

      - name: Create dist directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path dist | Out-Null

      - name: Build installer
        shell: pwsh
        run: |
          # Re-read machine and user PATH so choco-installed makensis is available
          $env:PATH = [System.Environment]::GetEnvironmentVariable("PATH","Machine") + ";" + [System.Environment]::GetEnvironmentVariable("PATH","User") + ";" + $env:PATH

          $repoRoot = (Get-Location).Path
          Write-Host "Repo root: $repoRoot"

          $makensis = $null
          foreach ($p in @(
            "makensis",
            "C:\Program Files (x86)\NSIS\makensis.exe",
            "C:\Program Files\NSIS\makensis.exe",
            "C:\ProgramData\chocolatey\bin\makensis.exe"
          )) {
            $cmd = Get-Command $p -ErrorAction SilentlyContinue
            if ($cmd) { $makensis = $cmd.Source; break }
          }
          if (-not $makensis) { Write-Error "makensis not found"; exit 1 }
          Write-Host "makensis: $makensis"

          # Build wrapper NSI using string concat (here-strings break YAML indentation)
          $nsiPath = Join-Path $repoRoot 'installer\windows\origin.nsi'
          $wrapperContent = "; Auto-generated wrapper`n" +
            "!define REPO_ROOT `"$repoRoot`"`n" +
            "!include `"$nsiPath`""

          $wrapperNsi = Join-Path $env:TEMP 'origin_wrapper.nsi'
          [System.IO.File]::WriteAllText($wrapperNsi, $wrapperContent, [System.Text.Encoding]::UTF8)
          Write-Host "--- Wrapper NSI ---"
          Get-Content $wrapperNsi
          Write-Host "-------------------"

          & $makensis -V3 $wrapperNsi
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/Origin-Setup.exe
          if-no-files-found: error

  # ────────────────────────────────────────────────
  # Create GitHub Release and attach both assets
  # ────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for release notes)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download macOS DMG
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release-assets/

      - name: Download Windows EXE
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: release-assets/

      - name: Generate release notes
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${{ github.ref_name }}$" | head -1)
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges | head -20)
          else
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges | head -20)
          fi
          {
            printf '## Origin %s\n\n' "${{ github.ref_name }}"
            printf '### What'"'"'s New\n'
            printf '%s\n' "$COMMITS"
            printf '\n---\n\n'
            printf '### Installation\n\n'
            printf '#### macOS\n'
            printf '1. Download **Origin.dmg**\n'
            printf '2. Open the DMG and drag **Origin** to Applications\n'
            printf '3. Double-click Origin to start — it will open in your browser\n\n'
            printf '> **First run:** right-click → Open to bypass Gatekeeper.\n\n'
            printf '#### Windows\n'
            printf '1. Download **Origin-Setup.exe**\n'
            printf '2. Run the installer (admin rights required)\n'
            printf '3. Launch Origin from the Start Menu or Desktop\n\n'
            printf '> **Requirement:** [Python 3.11+](https://python.org/downloads) — check "Add to PATH" during install.\n\n'
            printf '---\n\n'
            printf '### Requirements\n'
            printf '- **macOS 11+** — Homebrew required\n'
            printf '- **Windows 10/11** — Python 3.11+ required\n'
          } > notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Origin ${{ github.ref_name }}"
          body_path: notes.md
          draft: false
          prerelease: false
          files: |
            release-assets/Origin.dmg
            release-assets/Origin-Setup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
